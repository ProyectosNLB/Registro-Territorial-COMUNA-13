<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Territorial - Comuna 13</title>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        .header { background: linear-gradient(90deg, #371859, #2a1242); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .header h2 { margin: 0; font-size: 18px; }
        .header small { font-size: 12px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; color: white; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-archivo { background: #28a745; }
        .btn-archivo:hover { background: #218838; }
        .btn-enviar { background: linear-gradient(90deg, #371859, #2a1242); }
        .btn-enviar:hover { opacity: 0.9; }
        #map { height: 260px; margin-top: 12px; border-radius: 12px; border: 1px solid #ddd; }
        .preview { margin-top: 10px; text-align: center; }
        .preview img, .preview video { max-width: 100%; border-radius: 10px; border: 1px solid #eee; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>

<body>

<div class="header">
    <h2>Registro Territorial</h2>
    <div class="subheader">
        <strong>COMUNA 13</strong><br>
        Belgrano · Núñez · Colegiales<br>
        <small>Sede: Roosevelt 2489</small>
    </div>
</div>

<div class="container">
    <div class="card">
        <input id="nombre" type="text" placeholder="Nombre y Apellido">
        <input id="email" type="email" placeholder="Correo electrónico">

        <hr>

        <input id="autocomplete" placeholder="Escribí la dirección del reclamo aquí">
        <input id="street" placeholder="Calle" style="background-color: #f9f9f9;">
        <input id="number" placeholder="Altura" style="background-color: #f9f9f9;">
        
        <div style="display: flex; gap: 10px;">
            <input id="comuna" placeholder="Comuna" readonly style="background-color: #e9ecef; font-weight: bold;">
            <input id="barrio" placeholder="Barrio" readonly style="background-color: #e9ecef; font-weight: bold;">
        </div>

        <textarea id="descripcion" rows="4" placeholder="Describí las necesidades o inquietudes del vecino..."></textarea>

        <button type="button" class="btn-archivo" onclick="abrirArchivo()">📁 Subir foto o video</button>
        <input type="file" id="archivoInput" accept="image/*,video/*" style="display:none">

        <div class="preview" id="preview"></div>
        <div id="map"></div>

        <button class="btn-enviar" onclick="enviar()">ENVIAR REPORTE</button>
        <p id="status" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>
    </div>
</div>

<script>
    let autocomplete, map, marker, lat = "", lng = "";
    let archivoSeleccionado = null;
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxVAOvbbEP4lQLoeb1poHRhbCS1wRW5hCIZlFH4ekt1egFAQXc4WsPgL-Wc4KE95GDe/exec";

    function initAutocomplete() {
        autocomplete = new google.maps.places.Autocomplete(
            document.getElementById('autocomplete'),
            {
                types: ['address'],
                componentRestrictions: { country: "ar" },
                bounds: { north: -34.526, south: -34.705, east: -58.335, west: -58.531 },
                strictBounds: true
            }
        );

        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: -34.555, lng: -58.455 },
            zoom: 14
        });

        marker = new google.maps.Marker({ map: map });

        autocomplete.addListener('place_changed', function () {
            const place = autocomplete.getPlace();
            if (!place.geometry) return;

            // Reset campos
            document.getElementById('barrio').value = "";
            document.getElementById('comuna').value = "Comuna 13";

            for (const component of place.address_components) {
                const types = component.types;
                if (types.includes('route')) document.getElementById('street').value = component.long_name;
                if (types.includes('street_number')) document.getElementById('number').value = component.long_name;
                if (types.includes('sublocality_level_1')) document.getElementById('barrio').value = component.long_name;
            }

            lat = place.geometry.location.lat();
            lng = place.geometry.location.lng();

            map.setCenter({ lat, lng });
            marker.setPosition({ lat, lng });
            map.setZoom(17);
        });
    }

    function abrirArchivo() { document.getElementById("archivoInput").click(); }

    document.getElementById("archivoInput").addEventListener("change", function(e){
        archivoSeleccionado = e.target.files[0];
        const preview = document.getElementById("preview");
        preview.innerHTML = "";
        if (!archivoSeleccionado) return;
        
        const url = URL.createObjectURL(archivoSeleccionado);
        if (archivoSeleccionado.type.startsWith("image")) {
            preview.innerHTML = `<img src="${url}">`;
        } else {
            preview.innerHTML = `<video src="${url}" controls style="max-width:100%"></video>`;
        }
    });

    function enviar() {
        const status = document.getElementById("status");
        status.style.color = "blue";
        status.innerText = "⏳ Procesando reporte e IA...";

        const data = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            address: document.getElementById('autocomplete').value,
            street: document.getElementById('street').value,
            number: document.getElementById('number').value,
            city: "CABA",
            comuna: document.getElementById('comuna').value,
            barrio: document.getElementById('barrio').value,
            descripcion: document.getElementById('descripcion').value,
            lat: lat,
            lng: lng,
            file: "",
            fileName: ""
        };

        if (archivoSeleccionado) {
            const reader = new FileReader();
            reader.onload = function() {
                data.file = reader.result.split(',')[1];
                data.fileName = archivoSeleccionado.name;
                ejecutarPeticion(data);
            };
            reader.readAsDataURL(archivoSeleccionado);
        } else {
            ejecutarPeticion(data);
        }
    }

    function ejecutarPeticion(datos) {
        const status = document.getElementById("status");
        
        fetch(URL_SCRIPT, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(datos)
        })
        .then(() => {
            status.style.color = "green";
            status.innerText = "✅ ¡Enviado! La IA está clasificando tu reporte.";
            // Limpieza
            document.getElementById('descripcion').value = "";
            document.getElementById('preview').innerHTML = "";
            archivoSeleccionado = null;
        })
        .catch((error) => {
            console.error("Error:", error);
            status.style.color = "red";
            status.innerText = "❌ Error de conexión. Reintentá.";
        });
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAT_6lb0KlvCCwju4H2dhqhtIN6cU-3fkI&libraries=places&callback=initAutocomplete" async defer></script>

</body>
</html>
